<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">
<title>AdCockpit v2 — AI 数字营销驾驶舱</title>
<style>
*, *::after, *::before { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f8fc; --card: #fff; --border: #e8ecf1; --text: #1e293b;
  --text-2: #64748b; --text-3: #94a3b8; --accent: #3b82f6;
  --accent-light: #eff6ff; --green: #10b981; --red: #ef4444; --amber: #f59e0b;
  --sidebar-w: 200px; --header-h: 52px; --radius: 8px;
}
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); }
.header { height: var(--header-h); background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
.header .logo { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: -0.3px; }
.header .logo span { font-weight: 400; color: var(--text-2); }
.header .meta { margin-left: auto; font-size: 12px; color: var(--text-3); display: flex; align-items: center; gap: 16px; }
.header .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; }
.sidebar { position: fixed; top: var(--header-h); left: 0; bottom: 0; width: var(--sidebar-w); background: var(--card); border-right: 1px solid var(--border); padding: 20px 0; overflow-y: auto; z-index: 90; display: flex; flex-direction: column; }
.sidebar-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-3); padding: 12px 16px 8px; }
.sidebar-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: 13px; color: var(--text-2); cursor: pointer; border-radius: 6px; margin: 2px 8px; transition: all 0.15s; font-weight: 500; border: none; background: none; width: calc(100% - 16px); text-align: left; }
.sidebar-item:hover { background: var(--bg); color: var(--text); }
.sidebar-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.sidebar-divider { border-top: 1px solid var(--border); margin: 12px 16px; }
.main { margin-left: var(--sidebar-w); margin-top: var(--header-h); display: flex; height: calc(100vh - var(--header-h)); }
.col { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg); }
.col-header { padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-2); flex-shrink: 0; }
.col-left { width: 30%; min-width: 360px; } .col-mid { width: 28%; min-width: 380px; } .col-right { width: 42%; min-width: 480px; border-right: none; }
.chat-wrap { flex: 1; display: flex; flex-direction: column; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.chat-msg { display: flex; gap: 8px; } .chat-msg.user { flex-direction: row-reverse; }
.chat-msg .avatar { width: 30px; height: 30px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
.chat-msg.ai .avatar { background: var(--accent); color: #fff; } .chat-msg.user .avatar { background: var(--bg); border: 1px solid var(--border); color: var(--text-2); }
.chat-msg .bubble { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; }
.chat-msg.ai .bubble { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.chat-msg.user .bubble { background: var(--accent); color: #fff; }
.chat-input-row { padding: 12px 16px; background: var(--card); border-top: 1px solid var(--border); display: flex; gap: 8px; }
.chat-input-row input { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; background: var(--bg); color: var(--text); }
.chat-input-row input:focus { border-color: var(--accent); }
.chat-input-row button { padding: 10px 20px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
.param-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin: 0 16px 12px; display: none; }
.param-card h4 { font-size: 13px; margin-bottom: 12px; color: var(--text); }
.param-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.param-row label { font-size: 11px; color: var(--text-2); display: block; margin-bottom: 4px; }
.param-row input, .param-row select { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; }
.param-btns { display: flex; gap: 8px; margin-top: 4px; }
.btn-primary { padding: 8px 20px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
.btn-secondary { padding: 8px 20px; background: var(--card); color: var(--text-2); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; cursor: pointer; }
.trace-wrap { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
.flow-tracker { display: flex; align-items: center; gap: 0; padding: 12px 0; justify-content: center; }
.flow-node { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.flow-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; border: 2px solid var(--border); background: var(--bg); color: var(--text-3); }
.flow-dot.done { border-color: var(--green); background: #ecfdf5; color: var(--green); }
.flow-dot.active { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.flow-dot.wait { border-color: var(--amber); background: #fffbeb; color: var(--amber); }
.flow-line { width: 24px; height: 2px; background: var(--border); flex-shrink: 0; }
.flow-line.done { background: var(--green); }
.flow-label { font-size: 9px; color: var(--text-3); white-space: nowrap; }
.step-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; gap: 10px; border-left: 3px solid var(--border); }
.step-card.done { border-left-color: var(--green); } .step-card.running { border-left-color: var(--accent); } .step-card.waiting { border-left-color: var(--amber); }
.step-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.step-icon.done { background: #ecfdf5; color: var(--green); } .step-icon.running { background: var(--accent-light); color: var(--accent); } .step-icon.waiting { background: #fffbeb; color: var(--amber); }
.step-body .step-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.step-body .step-desc { font-size: 11px; color: var(--text-2); line-height: 1.5; }
.step-body .step-result { margin-top: 6px; padding: 6px 10px; background: var(--bg); border-radius: 4px; font-size: 11px; color: var(--text-2); }
.dash-wrap { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.metrics-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.metric-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.metric-card.alert { border-color: var(--red); background: #fef2f2; }
.metric-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 6px; }
.metric-value { font-size: 22px; font-weight: 700; } .metric-value.red { color: var(--red); }
.metric-sub { font-size: 11px; margin-top: 3px; } .metric-sub.up { color: var(--green); } .metric-sub.down { color: var(--red); }
.chart-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.chart-box h4 { font-size: 12px; font-weight: 600; margin-bottom: 12px; color: var(--text-2); }
.chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 120px; padding-bottom: 20px; position: relative; }
.chart-bar { flex: 1; border-radius: 3px 3px 0 0; background: var(--accent); opacity: 0.7; min-width: 20px; position: relative; }
.chart-bar.low { background: var(--red); }
.chart-bar .val { position: absolute; top: -16px; left: 0; right: 0; text-align: center; font-size: 9px; font-weight: 600; }
.chart-bar .lbl { position: absolute; bottom: -18px; left: 0; right: 0; text-align: center; font-size: 9px; color: var(--text-3); }
.chart-threshold { position: absolute; left: 0; right: 0; border-top: 1px dashed var(--red); z-index: 5; }
.table-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.table-box h4 { font-size: 12px; font-weight: 600; padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text-2); }
.table-box table { width: 100%; border-collapse: collapse; font-size: 11px; }
.table-box th { text-align: left; padding: 8px 12px; background: var(--bg); color: var(--text-2); font-weight: 500; border-bottom: 1px solid var(--border); cursor: pointer; }
.table-box td { padding: 7px 12px; border-bottom: 1px solid var(--border); }
.table-box .roi-lo { color: var(--red); font-weight: 600; }
.table-box .status-ok { color: var(--green); }
.table-box .pagination { display: flex; justify-content: space-between; padding: 10px 16px; font-size: 11px; color: var(--text-2); }
.table-box .pagination button { padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px; background: var(--card); cursor: pointer; font-size: 11px; }
.alert-item { display: flex; gap: 10px; align-items: flex-start; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); border-left: 3px solid var(--red); }
.alert-item.warn { border-left-color: var(--amber); }
.approval-card { background: #fffbeb; border: 1px solid var(--amber); border-radius: 8px; padding: 14px; margin: 8px 16px; }
.approval-card h4 { font-size: 14px; font-weight: 600; color: var(--amber); margin-bottom: 8px; }
.approval-card .ac-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #fde68a; }
</style>
</head>
<body>

<header class="header">
  <div class="logo">AdCockpit <span>| AI 数字营销驾驶舱</span></div>
  <div class="meta"><span><span class="dot"></span> 系统运行中</span><span id="header-time"></span><span>会话: demo-0611</span></div>
</header>

<nav class="sidebar">
  <div class="sidebar-label">业务操作</div>
  <button class="sidebar-item active" data-tab="optimize">&#9654; 投放优化</button>
  <button class="sidebar-item" data-tab="create">&#43; 新建计划</button>
  <button class="sidebar-item" data-tab="content">&#9998; 内容生产</button>
  <div class="sidebar-divider"></div>
  <div class="sidebar-label">数据监控</div>
  <button class="sidebar-item" data-tab="ecommerce">&#9673; 直播监控</button>
  <button class="sidebar-item" data-tab="data_analysis">&#9776; 数据分析</button>
  <button class="sidebar-item" data-tab="diagnosis">&#9881; 故障诊断</button>
  <div class="sidebar-divider"></div>
  <div class="sidebar-label">设置</div>
  <button class="sidebar-item">&#8635; 历史记录</button>
  <button class="sidebar-item">&#9881; 系统设置</button>
  <div style="flex:1;"></div>
  <div class="sidebar-divider"></div>
  <button class="sidebar-item" style="margin-bottom:4px;">&#127760; English / 中文</button>
  <div class="sidebar-item" style="margin-bottom:16px; background: var(--bg); border-radius: 6px; padding: 10px 16px; cursor: default;">
    <span style="width:28px; height:28px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600;">王</span>
    <div><div style="font-size:13px; font-weight:600;">优化师小王</div><div style="font-size:10px; color:var(--text-3);">wang@agency.com</div></div>
  </div>
</nav>

<div class="main">
  <div class="col col-left">
    <div class="col-header">对话面板</div>
    <div class="chat-wrap">
      <div class="chat-msgs" id="chatMsgs">
        <div class="chat-msg ai"><div class="avatar">AI</div><div class="bubble">你好，我是 AdCockpit AI 优化师。我可以帮你完成广告投放优化、内容生产、直播监控、数据分析和故障诊断。<br><br>请用自然语言描述你的需求。</div></div>
      </div>
      <div id="paramCardContainer"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="描述你的优化需求..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()">发送</button>
      </div>
    </div>
  </div>

  <div class="col col-mid">
    <div class="col-header">Agent 编排追踪</div>
    <div class="trace-wrap" id="traceWrap">
      <div id="flowTracker"></div>
      <div id="stepCards"></div>
    </div>
  </div>

  <div class="col col-right">
    <div class="col-header">数据洞察仪表盘 &nbsp;<span style="font-size:9px;color:var(--text-3);">投放优化模式</span></div>
    <div class="dash-wrap" id="dashContent"></div>
  </div>
</div>

<script src="/static/js/trace.js"></script>
<script src="/static/js/dashboard.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
